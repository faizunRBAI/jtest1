name: Deploy

on:
  workflow_dispatch:

jobs:
  provision:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    outputs:
      instance_public_ip: ${{ steps.tf_output.outputs.instance_public_ip }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Capture Terraform outputs
        id: tf_output
        working-directory: terraform
        run: |
          IP=$(terraform output -raw instance_public_ip)
          echo "instance_public_ip=${IP}" >> "$GITHUB_OUTPUT"

  configure:
    name: Configure Server
    runs-on: ubuntu-latest
    needs: [provision]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Wait for SSH to be available
        run: |
          SERVER_IP="${{ needs.provision.outputs.instance_public_ip }}"
          echo "Waiting for SSH on ${SERVER_IP}..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i ~/.ssh/id_rsa ubuntu@${SERVER_IP} "echo ready" 2>/dev/null; then
              echo "SSH is available."
              break
            fi
            echo "Attempt ${i}/30 - retrying in 10s..."
            sleep 10
          done

      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          SERVER_IP="${{ needs.provision.outputs.instance_public_ip }}"
          ansible-playbook \
            -i "${SERVER_IP}," \
            -u ubuntu \
            --private-key ~/.ssh/id_rsa \
            ansible/playbook.yml \
            -e "app_src=$(pwd)"

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [configure]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Read endpoint from Terraform output
        id: get_endpoint
        working-directory: terraform
        run: |
          APP_URL=$(terraform output -raw app_url)
          echo "app_url=${APP_URL}" >> "$GITHUB_OUTPUT"

      - name: Smoke test - verify app responds
        run: |-
          APP_URL="${{ steps.get_endpoint.outputs.app_url }}"
          echo "Probing ${APP_URL} ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" --max-time 15 "${APP_URL}" || true)
            echo "Attempt ${i}/12 - HTTP status: ${STATUS}"
            if [[ "${STATUS}" =~ ^[23] ]]; then
              echo " App is healthy (HTTP ${STATUS})"
              exit 0
            fi
            sleep 15
          done
          echo " App did not return a 2xx/3xx after 12 attempts"
          exit 1
